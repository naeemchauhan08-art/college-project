<!-- 
  PLACEHOLDER IMAGE - Replace with actual library wallpaper
  
  This is a simple gradient placeholder to show where your library 
  background image should go.
  
  INSTRUCTIONS:
  1. Download a library books image from Unsplash, Pexels, or Pixabay
  2. Save it as "library-bg.jpg" in this same folder (images/)
  3. Refresh your browser (Ctrl + F5)
  
  Recommended image specs:
  - Resolution: 1920x1080 pixels (Full HD)
  - Format: JPG or PNG
  - File size: Under 2MB
  - Orientation: Landscape
  
  Free image sources:
  - https://unsplash.com/s/photos/library-books
  - https://www.pexels.com/search/library%20books/
  - https://pixabay.com/images/search/library%20books/
-->
<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B3C5D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pattern for book-like shapes -->
    <pattern id="books" x="0" y="0" width="100" height="150" patternUnits="userSpaceOnUse">
      <rect x="5" y="10" width="20" height="130" fill="#FFD700" opacity="0.1"/>
      <rect x="30" y="5" width="25" height="140" fill="#ffffff" opacity="0.1"/>
      <rect x="60" y="15" width="15" height="125" fill="#FFD700" opacity="0.1"/>
      <rect x="80" y="8" width="15" height="135" fill="#ffffff" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Base layer -->
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Book pattern overlay -->
  <rect width="1920" height="1080" fill="url(#books)"/>
  
  <!-- Center text -->
  <text x="50%" y="50%" font-family="Arial, sans-serif" font-size="48" fill="rgba(255,255,255,0.3)" text-anchor="middle" dominant-baseline="middle">
    LIBRARY WALLPAPER
  </text>
  <text x="50%" y="55%" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    Place library-bg.jpg in this folder
  </text>
</svg>
